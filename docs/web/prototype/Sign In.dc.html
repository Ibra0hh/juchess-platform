<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="icon" type="image/png" href="assets/crest.png">
<link rel="apple-touch-icon" href="assets/crest.png">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="data.js"></script>
<style>
  html, body { margin: 0; padding: 0; background: #F5EFE3; }
</style>
</helmet>

<div style="min-height: 100vh; background: #F5EFE3; color: #1E2B45; font-family: 'IBM Plex Sans', sans-serif; display: flex; flex-direction: column;" data-screen-label="Sign In">

  <div style="position: absolute; inset: 0; background: conic-gradient(rgba(30,43,69,.04) 0 25%, transparent 0 50%, rgba(30,43,69,.04) 0 75%, transparent 0); background-size: 120px 120px; pointer-events: none;"></div>

  <header style="position: relative; z-index: 2; padding: 20px 28px;">
    <a href="Home.dc.html" style="display: inline-flex; align-items: center; gap: 11px; text-decoration: none; color: #1E2B45;">
      <img src="assets/crest.png" alt="Chess Club JU crest" style="width: 38px; height: 38px; object-fit: contain;">
      <span style="font-family: 'Cormorant Garamond', serif; font-size: 21px; font-weight: 700;">JuChess</span>
    </a>
  </header>

  <main style="position: relative; z-index: 2; flex: 1; display: flex; align-items: center; justify-content: center; padding: 24px;">
    <div style="width: 100%; max-width: 410px; background: #FFFCF4; border: 1px solid rgba(30,43,69,.16); border-radius: 12px; box-shadow: 0 10px 34px rgba(30,43,69,.10); padding: 34px 34px 28px;">
      <div style="text-align: center;">
        <img src="assets/crest.png" alt="" style="width: 62px; height: 62px; object-fit: contain;">
        <h1 style="font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 700; margin: 12px 0 4px;">Welcome back</h1>
        <p style="font-size: 13.5px; color: rgba(30,43,69,.65); margin: 0;">Sign in to your player club account</p>
      </div>

      <!-- social sign-in -->
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 24px;">
        <button type="button" onClick="{{ signApple }}" style="display: flex; align-items: center; justify-content: center; gap: 9px; height: 44px; background: #1E2B45; color: #FFFCF4; border: 1px solid #1E2B45; border-radius: 8px; font-family: 'IBM Plex Sans', sans-serif; font-size: 13.5px; font-weight: 600; cursor: pointer; transition: background .15s ease;" style-hover="background: #101a2e;" style-focus="outline: 2px solid #A98A3F; outline-offset: 2px;">
          <svg width="16" height="19" viewBox="0 0 170 210" fill="currentColor" aria-hidden="true"><path d="M150.4 71.6c-1 .8-19.7 11.3-19.7 34.7 0 27 23.7 36.6 24.4 36.8-.1.6-3.8 13-12.5 25.6-7.8 11.1-16 22.2-28.4 22.2s-15.6-7.2-29.9-7.2c-14 0-19 7.4-30.4 7.4S34.7 180.8 26 168.4C15.9 154 7.7 131.7 7.7 110.5c0-34 22.1-52 43.8-52 11.6 0 21.2 7.6 28.5 7.6 6.9 0 17.7-8.1 30.9-8.1 5 .1 23 .5 34.9 17.2l4.6-3.6zM108.7 33.2c5.7-6.7 9.7-16.1 9.7-25.5 0-1.3-.1-2.6-.3-3.7-9.2.3-20.2 6.1-26.8 13.8-5.2 5.9-10 15.3-10 24.8 0 1.4.2 2.9.3 3.3.6.1 1.5.2 2.5.2 8.3.1 18.7-5.4 24.6-12.9z"/></svg>
          Apple
        </button>
        <button type="button" onClick="{{ signGoogle }}" style="display: flex; align-items: center; justify-content: center; gap: 9px; height: 44px; background: #FFFFFF; color: #1E2B45; border: 1px solid rgba(30,43,69,.28); border-radius: 8px; font-family: 'IBM Plex Sans', sans-serif; font-size: 13.5px; font-weight: 600; cursor: pointer; transition: border-color .15s ease, background .15s ease;" style-hover="border-color: #A98A3F; background: #FDFAF1;" style-focus="outline: 2px solid #A98A3F; outline-offset: 2px;">
          <svg width="16" height="16" viewBox="0 0 48 48" aria-hidden="true"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9.1 3.6l6.8-6.8C35.8 2.4 30.3 0 24 0 14.6 0 6.5 5.4 2.6 13.2l7.9 6.1C12.4 13.4 17.7 9.5 24 9.5z"/><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v9h12.7c-.6 3-2.3 5.5-4.8 7.2l7.7 6c4.5-4.2 6.9-10.3 6.9-17.7z"/><path fill="#FBBC05" d="M10.5 28.6c-.5-1.5-.8-3-.8-4.6s.3-3.1.8-4.6l-7.9-6.1C.9 16.5 0 20.1 0 24s.9 7.5 2.6 10.8l7.9-6.2z"/><path fill="#34A853" d="M24 48c6.3 0 11.6-2.1 15.6-5.7l-7.7-6c-2.1 1.4-4.8 2.3-7.9 2.3-6.3 0-11.6-3.9-13.5-9.8l-7.9 6.2C6.5 42.6 14.6 48 24 48z"/></svg>
          Google
        </button>
      </div>

      <div style="display: flex; align-items: center; gap: 12px; margin: 22px 0 18px;">
        <span style="flex: 1; height: 1px; background: rgba(30,43,69,.14);"></span>
        <span style="font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: rgba(30,43,69,.5);">or with email</span>
        <span style="flex: 1; height: 1px; background: rgba(30,43,69,.14);"></span>
      </div>

      <div style="display: flex; flex-direction: column; gap: 14px;">
        <label style="display: flex; flex-direction: column; gap: 6px;">
          <span style="font-size: 12.5px; font-weight: 600;">Email or username</span>
          <input type="text" value="{{ email }}" onChange="{{ setEmail }}" placeholder="you@ju.edu.jo" style="height: 44px; padding: 0 14px; border: 1px solid rgba(30,43,69,.26); border-radius: 8px; background: #FFFFFF; font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; color: #1E2B45; outline: none; box-sizing: border-box; transition: border-color .15s ease;" style-focus="border-color: #7A2431; box-shadow: 0 0 0 3px rgba(122,36,49,.12);">
        </label>
        <label style="display: flex; flex-direction: column; gap: 6px;">
          <span style="display: flex; justify-content: space-between; align-items: baseline;">
            <span style="font-size: 12.5px; font-weight: 600;">Password</span>
            <a href="Forgot Password.dc.html" style="font-size: 12px; color: #7A2431; text-decoration: none; font-weight: 500;" style-hover="text-decoration: underline;">Forgot password?</a>
          </span>
          <input type="password" value="{{ password }}" onChange="{{ setPassword }}" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" style="height: 44px; padding: 0 14px; border: 1px solid rgba(30,43,69,.26); border-radius: 8px; background: #FFFFFF; font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; color: #1E2B45; outline: none; box-sizing: border-box; transition: border-color .15s ease;" style-focus="border-color: #7A2431; box-shadow: 0 0 0 3px rgba(122,36,49,.12);">
        </label>

        <button type="button" onClick="{{ signIn }}" style="height: 46px; background: #7A2431; color: #F8F3E7; border: none; border-radius: 8px; font-family: 'IBM Plex Sans', sans-serif; font-size: 14.5px; font-weight: 600; cursor: pointer; margin-top: 4px; transition: background .15s ease;" style-hover="background: #5F1B26;" style-focus="outline: 2px solid #A98A3F; outline-offset: 2px;">Sign In</button>
        <a href="Sign Up.dc.html" style="height: 46px; display: flex; align-items: center; justify-content: center; background: transparent; color: #1E2B45; border: 1px solid rgba(30,43,69,.3); border-radius: 8px; font-size: 14.5px; font-weight: 600; text-decoration: none; box-sizing: border-box; transition: border-color .15s ease, background .15s ease;" style-hover="border-color: #A98A3F; background: rgba(169,138,63,.08);">Sign Up</a>
        <a href="Home.dc.html" style="height: 40px; display: flex; align-items: center; justify-content: center; color: rgba(30,43,69,.65); font-size: 13.5px; font-weight: 500; text-decoration: none; border-radius: 8px;" style-hover="color: #7A2431; background: rgba(30,43,69,.05);">Enter as guest &rarr;</a>
      </div>
    </div>
  </main>

  <footer style="position: relative; z-index: 2; text-align: center; padding: 18px; font-size: 12px; color: rgba(30,43,69,.5);">University of Jordan Chess Club &middot; 2026</footer>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { email: '', password: '' };
  renderVals() {
    var self = this;
    return {
      email: this.state.email,
      password: this.state.password,
      setEmail: function (e) { self.setState({ email: e.target.value }); },
      setPassword: function (e) { self.setState({ password: e.target.value }); },
      signIn: function () { if (window.JU) window.JU.auth.set({ name: 'Ibrahim Ahmad', username: 'ibrahim_ju', rating: 1810 }); window.location.href = 'Profile.dc.html'; },
      signApple: function () { if (window.JU) window.JU.auth.set({ name: 'Ibrahim Ahmad', username: 'ibrahim_ju', rating: 1810, via: 'Apple' }); window.location.href = 'Profile.dc.html'; },
      signGoogle: function () { if (window.JU) window.JU.auth.set({ name: 'Ibrahim Ahmad', username: 'ibrahim_ju', rating: 1810, via: 'Google' }); window.location.href = 'Profile.dc.html'; }
    };
  }
}
</script>
</body>
</html>
