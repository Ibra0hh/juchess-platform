<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="theme-color" content="#f5efe3" />
    <title>JuChess Homepage — Two-Fix Preview</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <iframe id="home-preview" src="/home/" title="JuChess homepage two-fix preview"></iframe>

    <script>
      const frame = document.getElementById('home-preview')

      frame.addEventListener('load', () => {
        const previewDocument = frame.contentDocument
        if (!previewDocument || previewDocument.getElementById('juchess-two-fix-preview')) return

        const style = previewDocument.createElement('style')
        style.id = 'juchess-two-fix-preview'
        style.textContent = `
          /* Fix 1: the black format strip is always one horizontal row. */
          .home-marquee {
            justify-content: flex-start !important;
            flex-wrap: nowrap !important;
            gap: 0 !important;
            overflow-x: auto !important;
            overscroll-behavior-x: contain;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
          }

          .home-marquee::-webkit-scrollbar {
            display: none;
          }

          .home-marquee > span {
            flex: 0 0 auto;
            padding: 0 24px;
            border-right: 1px solid rgba(201, 174, 107, 0.32);
          }

          .home-marquee > span:last-child {
            border-right: 0;
          }

          @media (min-width: 981px) {
            .home-marquee {
              justify-content: center !important;
            }
          }

          /* Fix 2: the existing Vision section stays intact, only tighter. */
          .home-vision {
            padding-top: 64px !important;
            padding-bottom: 64px !important;
          }

          .home-vision .home-section-heading h2 {
            max-width: 680px !important;
            font-size: clamp(34px, 4.3vw, 44px) !important;
          }

          .home-vision .home-section-heading p {
            max-width: 520px !important;
            margin-top: 10px !important;
          }

          .home-vision .vision-card-grid {
            margin-top: 30px !important;
          }

          .home-vision .vision-card {
            padding: 20px !important;
          }

          .home-vision .vision-card strong {
            font-size: 25px !important;
          }

          .home-vision .vision-card h3 {
            margin-top: 7px !important;
            font-size: 21px !important;
          }

          .home-vision .vision-card p {
            margin-top: 7px !important;
            font-size: 12.5px !important;
            line-height: 1.5 !important;
          }

          @media (max-width: 760px) {
            .home-marquee {
              padding: 11px 0 !important;
              font-size: 15px !important;
            }

            .home-marquee > span {
              padding: 0 18px;
            }

            .home-vision {
              padding: 42px 16px !important;
            }

            .home-vision .home-section-heading,
            .home-vision .vision-card-grid {
              width: 100% !important;
              max-width: 343px !important;
              margin-right: auto !important;
              margin-left: auto !important;
              box-sizing: border-box !important;
            }

            .home-vision .home-section-heading h2 {
              width: 100% !important;
              max-width: 340px !important;
              font-size: 30px !important;
              overflow-wrap: anywhere;
            }

            .home-vision .home-section-heading p {
              max-width: 340px !important;
              font-size: 12.5px !important;
              line-height: 1.48 !important;
            }

            .home-vision .vision-card-grid {
              gap: 8px !important;
              margin-top: 22px !important;
            }

            .home-vision .vision-card {
              min-width: 0 !important;
              padding: 14px 16px !important;
              border-radius: 10px !important;
              box-sizing: border-box !important;
            }

            .home-vision .vision-card strong {
              font-size: 21px !important;
            }

            .home-vision .vision-card h3 {
              margin-top: 4px !important;
              font-size: 18px !important;
            }

            .home-vision .vision-card p {
              margin-top: 5px !important;
              font-size: 12px !important;
              line-height: 1.4 !important;
            }
          }
        `

        previewDocument.head.appendChild(style)

        if (new URLSearchParams(window.location.search).get('section') === 'vision') {
          let attempts = 0
          const revealVision = () => {
            const vision = previewDocument.getElementById('vision')
            if (vision) {
              previewDocument.documentElement.style.scrollBehavior = 'auto'
              previewDocument.scrollingElement.scrollTop = vision.offsetTop
              return
            }

            attempts += 1
            if (attempts < 20) window.setTimeout(revealVision, 250)
          }

          revealVision()
        }
      })
    </script>
  </body>
</html>
