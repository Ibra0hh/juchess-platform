<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="data.js"></script>
<style>
  html, body { margin: 0; padding: 0; background: #F5EFE3; }
  @media (max-width: 640px) { .ju-two-col { grid-template-columns: 1fr !important; } }
</style>
</helmet>

<div style="min-height: 100vh; background: #F5EFE3; color: #1E2B45; font-family: 'IBM Plex Sans', sans-serif; display: flex; flex-direction: column;" data-screen-label="Sign Up">

  <div style="position: absolute; inset: 0; background: conic-gradient(rgba(30,43,69,.04) 0 25%, transparent 0 50%, rgba(30,43,69,.04) 0 75%, transparent 0); background-size: 120px 120px; pointer-events: none;"></div>

  <header style="position: relative; z-index: 2; padding: 20px 28px;">
    <a href="Home.dc.html" style="display: inline-flex; align-items: center; gap: 11px; text-decoration: none; color: #1E2B45;">
      <img src="assets/crest.png" alt="Chess Club JU crest" style="width: 38px; height: 38px; object-fit: contain;">
      <span style="font-family: 'Cormorant Garamond', serif; font-size: 21px; font-weight: 700;">JuChess</span>
    </a>
  </header>

  <main style="position: relative; z-index: 2; flex: 1; display: flex; align-items: flex-start; justify-content: center; padding: 12px 24px 40px;">
    <div style="width: 100%; max-width: 560px; background: #FFFCF4; border: 1px solid rgba(30,43,69,.16); border-radius: 12px; box-shadow: 0 10px 34px rgba(30,43,69,.10); padding: 34px 38px 30px; box-sizing: border-box;">
      <div style="text-align: center;">
        <h1 style="font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 700; margin: 0 0 4px;">Create Player Club Account</h1>
        <p style="font-size: 13.5px; color: rgba(30,43,69,.65); margin: 0;">Join the University of Jordan Chess Club roster</p>
      </div>

      <div style="display: flex; flex-direction: column; gap: 14px; margin-top: 26px;">
        <label style="display: flex; flex-direction: column; gap: 6px;">
          <span style="font-size: 12.5px; font-weight: 600;">Full name</span>
          <input type="text" placeholder="e.g. Ibrahim Ahmad" style="height: 43px; padding: 0 14px; border: 1px solid rgba(30,43,69,.26); border-radius: 8px; background: #FFFFFF; font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; color: #1E2B45; outline: none; box-sizing: border-box;" style-focus="border-color: #7A2431; box-shadow: 0 0 0 3px rgba(122,36,49,.12);">
        </label>

        <div class="ju-two-col" style="display: grid; grid-template-columns: 1fr 1fr; gap: 14px;">
          <label style="display: flex; flex-direction: column; gap: 6px;">
            <span style="font-size: 12.5px; font-weight: 600;">Email</span>
            <input type="email" placeholder="you@ju.edu.jo" style="height: 43px; padding: 0 14px; border: 1px solid rgba(30,43,69,.26); border-radius: 8px; background: #FFFFFF; font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; color: #1E2B45; outline: none; box-sizing: border-box;" style-focus="border-color: #7A2431; box-shadow: 0 0 0 3px rgba(122,36,49,.12);">
          </label>
          <label style="display: flex; flex-direction: column; gap: 6px;">
            <span style="font-size: 12.5px; font-weight: 600;">Phone number</span>
            <input type="tel" placeholder="+962 7X XXX XXXX" style="height: 43px; padding: 0 14px; border: 1px solid rgba(30,43,69,.26); border-radius: 8px; background: #FFFFFF; font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; color: #1E2B45; outline: none; box-sizing: border-box;" style-focus="border-color: #7A2431; box-shadow: 0 0 0 3px rgba(122,36,49,.12);">
          </label>
        </div>

        <label style="display: flex; flex-direction: column; gap: 6px;">
          <span style="font-size: 12.5px; font-weight: 600;">University ID</span>
          <input type="text" placeholder="e.g. 0201234" style="height: 43px; padding: 0 14px; border: 1px solid rgba(30,43,69,.26); border-radius: 8px; background: #FFFFFF; font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; color: #1E2B45; outline: none; box-sizing: border-box;" style-focus="border-color: #7A2431; box-shadow: 0 0 0 3px rgba(122,36,49,.12);">
          <span style="font-size: 11.5px; color: rgba(30,43,69,.55);">Used for club verification only &mdash; never shown publicly.</span>
        </label>

        <div class="ju-two-col" style="display: grid; grid-template-columns: 1fr 1fr; gap: 14px;">
          <label style="display: flex; flex-direction: column; gap: 6px;">
            <span style="font-size: 12.5px; font-weight: 600;">Chess.com username <span style="font-weight: 400; color: rgba(30,43,69,.5);">(optional)</span></span>
            <input type="text" placeholder="username" style="height: 43px; padding: 0 14px; border: 1px solid rgba(30,43,69,.26); border-radius: 8px; background: #FFFFFF; font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; color: #1E2B45; outline: none; box-sizing: border-box;" style-focus="border-color: #7A2431; box-shadow: 0 0 0 3px rgba(122,36,49,.12);">
          </label>
          <label style="display: flex; flex-direction: column; gap: 6px;">
            <span style="font-size: 12.5px; font-weight: 600;">Lichess username <span style="font-weight: 400; color: rgba(30,43,69,.5);">(optional)</span></span>
            <input type="text" placeholder="username" style="height: 43px; padding: 0 14px; border: 1px solid rgba(30,43,69,.26); border-radius: 8px; background: #FFFFFF; font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; color: #1E2B45; outline: none; box-sizing: border-box;" style-focus="border-color: #7A2431; box-shadow: 0 0 0 3px rgba(122,36,49,.12);">
          </label>
        </div>

        <label style="display: flex; flex-direction: column; gap: 6px;">
          <span style="font-size: 12.5px; font-weight: 600;">Password</span>
          <input type="password" value="{{ pw }}" onChange="{{ setPw }}" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" style="height: 43px; padding: 0 14px; border: 1px solid rgba(30,43,69,.26); border-radius: 8px; background: #FFFFFF; font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; color: #1E2B45; outline: none; box-sizing: border-box;" style-focus="border-color: #7A2431; box-shadow: 0 0 0 3px rgba(122,36,49,.12);">
        </label>

        <!-- password rules -->
        <div style="display: flex; flex-wrap: wrap; gap: 8px;">
          <span style="font-size: 11.5px; padding: 4px 10px; border-radius: 999px; border: 1px solid {{ rLenB }}; color: {{ rLenC }}; background: {{ rLenBg }};">8+ characters</span>
          <span style="font-size: 11.5px; padding: 4px 10px; border-radius: 999px; border: 1px solid {{ rUpB }}; color: {{ rUpC }}; background: {{ rUpBg }};">1 uppercase letter</span>
          <span style="font-size: 11.5px; padding: 4px 10px; border-radius: 999px; border: 1px solid {{ rNumB }}; color: {{ rNumC }}; background: {{ rNumBg }};">1 number</span>
        </div>

        <label style="display: flex; flex-direction: column; gap: 6px;">
          <span style="font-size: 12.5px; font-weight: 600;">Confirm password</span>
          <input type="password" value="{{ pw2 }}" onChange="{{ setPw2 }}" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" style="height: 43px; padding: 0 14px; border: 1px solid rgba(30,43,69,.26); border-radius: 8px; background: #FFFFFF; font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; color: #1E2B45; outline: none; box-sizing: border-box;" style-focus="border-color: #7A2431; box-shadow: 0 0 0 3px rgba(122,36,49,.12);">
          <sc-if value="{{ mismatch }}" hint-placeholder-val="{{ false }}">
            <span style="font-size: 12px; color: #7A2431; font-weight: 500;">Passwords don&rsquo;t match yet.</span>
          </sc-if>
        </label>

        <button type="button" onClick="{{ create }}" style="height: 46px; background: #7A2431; color: #F8F3E7; border: none; border-radius: 8px; font-family: 'IBM Plex Sans', sans-serif; font-size: 14.5px; font-weight: 600; cursor: pointer; margin-top: 6px; transition: background .15s ease;" style-hover="background: #5F1B26;" style-focus="outline: 2px solid #A98A3F; outline-offset: 2px;">Create Account</button>

        <div style="text-align: center; margin-top: 6px; font-size: 13.5px; color: rgba(30,43,69,.7);">
          Do you have an account? <a href="Sign In.dc.html" style="color: #7A2431; font-weight: 600; text-decoration: none;" style-hover="text-decoration: underline;">Sign in</a>
        </div>
      </div>
    </div>
  </main>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { pw: '', pw2: '' };
  renderVals() {
    var self = this;
    var pw = this.state.pw;
    function rule(ok) {
      return ok
        ? { b: 'rgba(74,124,63,.45)', c: '#3F6B36', bg: 'rgba(74,124,63,.10)' }
        : { b: 'rgba(30,43,69,.22)', c: 'rgba(30,43,69,.6)', bg: 'transparent' };
    }
    var len = rule(pw.length >= 8);
    var up = rule(/[A-Z]/.test(pw));
    var num = rule(/[0-9]/.test(pw));
    return {
      pw: pw, pw2: this.state.pw2,
      setPw: function (e) { self.setState({ pw: e.target.value }); },
      setPw2: function (e) { self.setState({ pw2: e.target.value }); },
      mismatch: this.state.pw2.length > 0 && this.state.pw2 !== pw,
      rLenB: len.b, rLenC: len.c, rLenBg: len.bg,
      rUpB: up.b, rUpC: up.c, rUpBg: up.bg,
      rNumB: num.b, rNumC: num.c, rNumBg: num.bg,
      create: function () { if (window.JU) window.JU.auth.set({ name: 'Ibrahim Ahmad', username: 'ibrahim_ju', rating: 1810 }); window.location.href = 'Profile.dc.html'; }
    };
  }
}
</script>
</body>
</html>
